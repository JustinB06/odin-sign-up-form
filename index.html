<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Sign-up Form</title>
  </head>

  <body>
    <div id="layout-container">
      <div id="sidebar">
        <div id="odin-heading">
          <!-- Logo isn't essential, no alt necessary. -->
          <img src="images/odin-lined.png" alt="" />

          <h1>ODIN</h1>
        </div>

        <p>Photo by Halie West on Unsplash</p>
      </div>

      <div id="main-section">
        <div class="main-heading">
          <h3>
            This is not a real online service! You know you need something
            <br />
            like this in your life to help you realize your deepest dreams.
          </h3>

          <h3>Sign up <em>now</em> to get started.</h3>

          <br />

          <h3>You <em>know</em> you want to.</h3>
        </div>

        <div id="form-section">
          <form action="">
            <div id="form-field-section">
              <h3>Let's do this!</h3>

              <div id="form-row-1">
                <div id="user-first-name">
                  <label for="fname">FIRST NAME</label>
                  <input type="text" name="fname" id="fname" />
                </div>

                <div id="user-last-name">
                  <label for="lname">LAST NAME</label>
                  <input type="text" name="lname" id="lname" />
                </div>
              </div>

              <div id="form-row-2">
                <div id="user-email">
                  <label for="email">EMAIL</label>
                  <input type="email" name="email" id="email" />
                </div>

                <div id="user-phone-number">
                  <label for="phone-number">PHONE NUMBER</label>
                  <input type="tel" name="phone-number" id="phone-number" />
                </div>
              </div>

              <div id="form-row-3">
                <div id="user-password">
                  <label for="password">PASSWORD</label>
                  <input type="password" name="password" id="password" />
                </div>

                <div id="user-password-confirm">
                  <label for="password">CONFIRM PASSWORD</label>
                  <input type="password" name="password" id="password" />
                </div>
              </div>
            </div>

            <button type="submit">Create Account</button>
          </form>
        </div>

        <p>Already have an account? <span id="log-in">Log in</span></p>
      </div>
    </div>
  </body>
</html>
