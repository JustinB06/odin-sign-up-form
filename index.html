<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Sign-up Form</title>
  </head>

  <body>
    <div id="sidebar">
      <div id="sidebar-heading">
        <!-- Logo isn't essential, no alt necessary. -->
        <img id="sidebar-image" src="images/odin-lined.png" alt="" />

        <h1 id="sidebar-heading-text">ODIN</h1>
      </div>

      <p id="sidebar-image-source-text">Photo by Halie West on Unsplash</p>
    </div>

    <div id="main-content">
      <div id="main-content-header">
        <h3>
          This is not a real online service! You know you need something like
          this in your life to help you realize your deepest dreams.
        </h3>

        <h3>Sign up <em>now</em> to get started.</h3>

        <br />

        <h3>You <em>know</em> you want to.</h3>
      </div>

      <form action="">
        <h3>Let's do this!</h3>

        <div id="form-row-1" class="form-row">
          <div id="user-first-name" class="field-label-pair">
            <label for="fname">FIRST NAME</label>
            <input type="text" name="fname" id="fname" />
          </div>

          <div id="user-last-name" class="field-label-pair">
            <label for="lname">LAST NAME</label>
            <input type="text" name="lname" id="lname" />
          </div>
        </div>

        <div id="form-row-2" class="form-row">
          <div id="user-email" class="field-label-pair">
            <label for="email">EMAIL</label>
            <input type="email" name="email" id="email" />
          </div>

          <div id="user-phone-number" class="field-label-pair">
            <label for="phone-number">PHONE NUMBER</label>
            <input
              type="tel"
              name="phone-number"
              id="phone-number"
              pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
            />
          </div>
        </div>

        <div id="form-row-3" class="form-row">
          <div id="user-password" class="field-label-pair">
            <label for="password">PASSWORD</label>
            <input type="password" name="password" id="password" />
          </div>

          <div id="user-confirm-password" class="field-label-pair">
            <label for="confirm-password">CONFIRM PASSWORD</label>
            <input
              type="password"
              name="confirm-password"
              id="confirm-password"
            />
          </div>
        </div>

        <button type="submit">Create Account</button>
      </form>

      <p>Already have an account? <span id="log-in">Log in</span></p>
    </div>
  </body>
</html>
